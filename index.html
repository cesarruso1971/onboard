<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060d18;
    --surface: #0d1f35;
    --surface2: #122640;
    --aboard: #38bdf8;
    --aboard-dim: #0c4a6e;
    --out: #f97316;
    --out-dim: #7c2d12;
    --text: #e8f4fd;
    --muted: #4d7fa8;
    --border: #1a3a5c;
    --accent: #fbbf24;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 50% 0%, #0a2a4a88 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, #0a1f3308 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, #0a1f3308 41px);
  }

  /* HEADER */
  header {
    position: relative;
    padding: 24px 24px 20px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0a2a4a 0%, transparent 100%);
  }

  .ship-icon {
    font-size: 2rem;
    display: block;
    margin-bottom: 6px;
    filter: drop-shadow(0 0 16px #38bdf855);
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.3rem, 4.5vw, 2rem);
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 20%, var(--accent) 60%, var(--aboard));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 6px;
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* STICKY STATS BAR */
  .stats {
    display: flex;
    justify-content: center;
    gap: 0;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .stat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 12px 8px;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1;
  }

  .stat-num.aboard { color: var(--aboard); text-shadow: 0 0 20px #38bdf855; }
  .stat-num.out    { color: var(--out);    text-shadow: 0 0 20px #f9731655; }

  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* SECTION */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    padding: 0 18px;
    margin: 22px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* GRID — always 2 columns */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 0 12px;
  }

  .card {
    border-radius: 14px;
    padding: 18px 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    cursor: default;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
    transition: background 0.3s;
  }

  .card.aboard::before { background: var(--aboard); box-shadow: 0 0 10px var(--aboard); }
  .card.out::before    { background: var(--out);    box-shadow: 0 0 10px var(--out); }
  .card.unknown::before { background: var(--muted); }

  .card.aboard { border-color: #166534; background: linear-gradient(160deg, #14532d 0%, #166534 100%); }
  .card.out    { border-color: #991b1b; background: linear-gradient(160deg, #7f1d1d 0%, #991b1b 100%); }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    text-align: center;
    color: var(--text);
    line-height: 1.2;
  }

  .card-role {
    font-size: 0.65rem;
    color: var(--muted);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .card-time {
    font-size: 0.62rem;
    color: var(--muted);
  }

  /* CARD TOGGLE BUTTONS */
  .card-btns {
    display: flex;
    gap: 5px;
    width: 100%;
    margin-top: 4px;
  }

  .card-btn {
    flex: 1;
    padding: 10px 4px;
    min-height: 44px;
    border-radius: 8px;
    border: 1.5px solid transparent;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    -webkit-tap-highlight-color: transparent;
  }

  .card-btn.aboard-btn {
    background: var(--aboard-dim);
    color: var(--aboard);
    border-color: var(--aboard-dim);
  }
  .card-btn.aboard-btn:hover,
  .card-btn.aboard-btn.active {
    background: var(--aboard);
    color: #000;
    border-color: var(--aboard);
    box-shadow: 0 0 12px #38bdf844;
  }

  .card-btn.out-btn {
    background: var(--out-dim);
    color: var(--out);
    border-color: var(--out-dim);
  }
  .card-btn.out-btn:hover,
  .card-btn.out-btn.active {
    background: var(--out);
    color: #000;
    border-color: var(--out);
    box-shadow: 0 0 12px #f9731644;
  }

  /* PIN OVERLAY */
  #pin-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    background-image: radial-gradient(ellipse at 50% 30%, #0a2a4a 0%, transparent 70%);
    z-index: 300;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 32px;
  }

  #pin-overlay .ship-icon { font-size: 3rem; margin-bottom: 0; }

  #pin-overlay h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: center;
    background: linear-gradient(135deg, #fff 20%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #pin-overlay p {
    font-size: 0.82rem;
    color: var(--muted);
    text-align: center;
  }

  .pin-dots {
    display: flex;
    gap: 14px;
    justify-content: center;
  }

  .pin-dot {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    transition: all 0.2s;
  }

  .pin-dot.filled {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 10px #fbbf2466;
  }

  .pin-dot.error {
    background: var(--out);
    border-color: var(--out);
    box-shadow: 0 0 10px #f9731666;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-6px); }
    40%       { transform: translateX(6px); }
    60%       { transform: translateX(-4px); }
    80%       { transform: translateX(4px); }
  }

  .pin-keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 280px;
  }

  .pin-key {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    height: 64px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .pin-key:active {
    background: var(--surface2);
    border-color: var(--accent);
    transform: scale(0.94);
  }

  .pin-key.del { font-size: 1.1rem; color: var(--muted); }

  .pin-key.empty {
    background: transparent;
    border-color: transparent;
    cursor: default;
    pointer-events: none;
  }

  .pin-error-msg {
    font-size: 0.78rem;
    color: var(--out);
    text-align: center;
    min-height: 1.2em;
    letter-spacing: 0.04em;
  }

</style>
</head>

<!-- MAIN APP -->
<header>

<div class="grid" id="grid-unknown"></div>


<!-- PIN logic (debe ser script normal, no module) -->
<script>
const CORRECT_PIN = '2009'; // ← cambia este PIN
const PIN_SESSION = 'barco_pin_ok';

let pinEntry = '';

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot-' + i).classList.toggle('filled', i < pinEntry.length);
  }
}

function pinPress(digit) {
  if (pinEntry.length >= 4) return;
  pinEntry += digit;
  updateDots();
  if (pinEntry.length === 4) checkPin();
}

function pinDel() {
  pinEntry = pinEntry.slice(0, -1);
  updateDots();
  document.getElementById('pin-error').textContent = '';
}

function checkPin() {
  if (pinEntry === CORRECT_PIN) {
    sessionStorage.setItem(PIN_SESSION, '1');
    document.getElementById('pin-overlay').style.display = 'none';
  } else {
    const dots = document.querySelectorAll('.pin-dot');
    dots.forEach(d => { d.classList.remove('filled'); d.classList.add('error'); });
    document.getElementById('pin-error').textContent = 'PIN incorrecto, inténtalo de nuevo';
    setTimeout(() => {
      dots.forEach(d => d.classList.remove('error'));
      pinEntry = '';
      updateDots();
      document.getElementById('pin-error').textContent = '';
    }, 900);
  }
}

// Teclado físico
document.addEventListener('keydown', e => {
  if (document.getElementById('pin-overlay').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') pinPress(e.key);
  if (e.key === 'Backspace') pinDel();
});

// Si ya autenticó en esta sesión, ocultar overlay directamente
if (sessionStorage.getItem(PIN_SESSION)) {
  document.getElementById('pin-overlay').style.display = 'none';
}
</script>

<!-- Firebase + App logic -->
<script type="module">
import { initializeApp }                  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── Firebase config ──────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyDY0VwMXFhNCa9eN4fGchGw0e6FpDA5kOE",
  authDomain:        "onboard-8a1cf.firebaseapp.com",
  databaseURL:       "https://onboard-8a1cf-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "onboard-8a1cf",
  storageBucket:     "onboard-8a1cf.firebasestorage.app",
  messagingSenderId: "305623972369",
  appId:             "1:305623972369:web:09a8a752d4402f290d0fb0"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── Tripulación ───────────────────────────────────────────────
const CREW = [
  { id: 1,  name: "CESAR",  role: "Puente"   },
  { id: 2,  name: "SERGIO", role: "Puente"   },
  { id: 3,  name: "SAUL",   role: "Puente"   },
  { id: 4,  name: "DANI",   role: "Máquinas" },
  { id: 5,  name: "ANTON",  role: "Máquinas" },
  { id: 6,  name: "JUAN A.",role: "Cubierta" },
  { id: 7,  name: "MESURA", role: "Cubierta" },
  { id: 8,  name: "NURIA",  role: "Cubierta" },
  { id: 9,  name: "ADELINO",role: "Sistemas" },
  { id: 10, name: "TOÑO",   role: "Máquinas" },
  { id: 11, name: "DAVID",  role: "Servicio" },
];

let statuses = {};

// ── Escucha cambios en Firebase en tiempo real ────────────────
onValue(ref(db, 'crew'), snapshot => {
  statuses = snapshot.val() || {};
  renderAll();
});

// ── Guardar estado en Firebase ────────────────────────────────
function setStatus(id, status) {
  const time = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  set(ref(db, `crew/${id}`), { status, time });
}
window.setStatus = setStatus;

// ── Renderizado ───────────────────────────────────────────────
function makeCard(c) {
  const s      = statuses[c.id];
  const status = s ? s.status : 'unknown';
  const card   = document.createElement('div');
  card.className = `card ${status}`;
  card.innerHTML = `
    <div class="card-name">${c.name}</div>
    <div class="card-role">${c.role}</div>
    <div class="card-time">${s ? 'desde ' + s.time : 'Sin confirmar'}</div>
    <div class="card-btns">
      <button class="card-btn aboard-btn${status === 'aboard' ? ' active' : ''}"
        onclick="setStatus(${c.id},'aboard')">⚓ A Bordo</button>
      <button class="card-btn out-btn${status === 'out' ? ' active' : ''}"
        onclick="setStatus(${c.id},'out')">🏖️ Tierra</button>
    </div>`;
  return card;
}

function renderAll() {
  const aboardEl  = document.getElementById('grid-aboard');
  const outEl     = document.getElementById('grid-out');
  const unknownEl = document.getElementById('grid-unknown');
  aboardEl.innerHTML = outEl.innerHTML = unknownEl.innerHTML = '';

  let countAboard = 0, countOut = 0;

  CREW.forEach(c => {
    const s    = statuses[c.id];
    const card = makeCard(c);
    if (!s)                         { unknownEl.appendChild(card); }
    else if (s.status === 'aboard') { aboardEl.appendChild(card); countAboard++; }
    else                            { outEl.appendChild(card);    countOut++;    }
  });

  document.getElementById('count-aboard').textContent = countAboard;
  document.getElementById('count-out').textContent    = countOut;

  document.getElementById('section-aboard-label').style.display  = aboardEl.children.length  ? '' : 'none';
  document.getElementById('section-out-label').style.display     = outEl.children.length     ? '' : 'none';
  document.getElementById('section-unknown-label').style.display = unknownEl.children.length ? '' : 'none';
}

// ── PWA: Service Worker ───────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'tripulacion-v2';
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('fetch', e => {
      if (e.request.url.includes('firebasedatabase')) return;
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });`;
  const swURL = URL.createObjectURL(new Blob([swCode], { type: 'application/javascript' }));
  navigator.serviceWorker.register(swURL).catch(() => {});
}

// ── PWA: Banner instalación Android ──────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
});
window.installApp = function() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  }
};
</script>

<!-- Banner instalación Android -->

      padding:8px 14px;border-radius:8px;cursor:pointer;font-size:0.78rem">Instalar</button>

</div>
