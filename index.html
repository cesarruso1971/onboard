<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060d18;
    --surface: #0d1f35;
    --surface2: #122640;
    --aboard: #38bdf8;
    --aboard-dim: #0c4a6e;
    --out: #f97316;
    --out-dim: #7c2d12;
    --text: #e8f4fd;
    --muted: #4d7fa8;
    --border: #1a3a5c;
    --accent: #fbbf24;
    --admin: #a78bfa;
    --admin-dim: #2e1065;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 50% 0%, #0a2a4a88 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, #0a1f3308 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, #0a1f3308 41px);
  }

  /* ── SCREENS ─────────────────────────────── */
  .screen { display: none; min-height: 100vh; padding-bottom: 60px; }
  .screen.active { display: block; }

  /* ── HEADER ──────────────────────────────── */
  header {
    position: relative; padding: 24px 24px 20px; text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0a2a4a 0%, transparent 100%);
  }
  .ship-icon { font-size: 2rem; display: block; margin-bottom: 6px; filter: drop-shadow(0 0 16px #38bdf855); }
  header h1 {
    font-family: 'Syne', sans-serif; font-size: clamp(1.3rem, 4.5vw, 2rem);
    font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase;
    background: linear-gradient(135deg, #fff 20%, var(--accent) 60%, var(--aboard));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { margin-top: 6px; font-size: 0.8rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }

  #admin-badge {
    display: none; position: absolute; top: 16px; right: 16px;
    background: var(--admin-dim); border: 1px solid var(--admin); color: var(--admin);
    font-size: 0.68rem; font-family: 'Syne', sans-serif; font-weight: 700;
    border-radius: 8px; padding: 5px 10px; text-transform: uppercase;
    letter-spacing: 0.06em; cursor: pointer;
  }
  #admin-badge.visible { display: block; }

  /* ── LOG BUTTON (solo admin) ─────────────── */
  #log-btn {
    display: none;
    margin: 16px 12px 0;
    width: calc(100% - 24px);
    padding: 13px;
    background: var(--admin-dim);
    border: 1px solid var(--admin);
    border-radius: 12px;
    color: var(--admin);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  #log-btn:hover { background: var(--admin); color: #000; }
  body.admin-mode #log-btn { display: block; }

  /* ── STICKY STATS ────────────────────────── */
  .stats {
    display: flex; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
    background: var(--bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .stat { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 12px 8px; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; line-height: 1; }
  .stat-num.aboard { color: var(--aboard); text-shadow: 0 0 20px #38bdf855; }
  .stat-num.out    { color: var(--out);    text-shadow: 0 0 20px #f9731655; }
  .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

  /* ── SECTION TITLES ──────────────────────── */
  .section-title {
    font-family: 'Syne', sans-serif; font-size: 0.65rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted);
    padding: 0 18px; margin: 22px 0 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── GRID ────────────────────────────────── */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 12px; }

  /* ── CARD ────────────────────────────────── */
  .card {
    border-radius: 14px; padding: 16px 12px 14px;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    gap: 5px; transition: all 0.3s ease; position: relative; overflow: hidden; cursor: default;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: 14px 14px 0 0; transition: background 0.3s;
  }
  .card.aboard::before { background: var(--aboard); box-shadow: 0 0 10px var(--aboard); }
  .card.out::before    { background: var(--out);    box-shadow: 0 0 10px var(--out); }
  .card.unknown::before { background: var(--muted); }
  .card.aboard { border-color: #166534; background: linear-gradient(160deg, #14532d 0%, #166534 100%); }
  .card.out    { border-color: #991b1b; background: linear-gradient(160deg, #7f1d1d 0%, #991b1b 100%); }

  .card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.88rem; text-align: center; color: var(--text); line-height: 1.2; }
  .card-role { font-size: 0.65rem; color: var(--muted); text-align: center; text-transform: uppercase; letter-spacing: 0.05em; }
  .card-time { font-size: 0.62rem; color: var(--muted); }

  .card-phone {
    display: none; align-items: center; gap: 5px;
    background: var(--admin-dim); border: 1px solid var(--admin);
    border-radius: 8px; padding: 6px 10px; text-decoration: none;
    color: var(--admin); font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 0.72rem; letter-spacing: 0.04em; transition: all 0.18s;
    -webkit-tap-highlight-color: transparent; width: 100%; justify-content: center; margin-top: 2px;
  }
  .card-phone:hover, .card-phone:active { background: var(--admin); color: #000; box-shadow: 0 0 12px #a78bfa55; }
  body.admin-mode .card-phone { display: flex; }

  .card-btns { display: flex; gap: 5px; width: 100%; margin-top: 4px; }
  .card-btn {
    flex: 1; padding: 10px 4px; min-height: 44px; border-radius: 8px;

    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.68rem;
    text-transform: uppercase; letter-spacing: 0.04em; transition: all 0.18s;

  .card-btn.aboard-btn:hover, .card-btn.aboard-btn.active { background: var(--aboard); color: #000; border-color: var(--aboard); box-shadow: 0 0 12px #38bdf844; }
  .card-btn.out-btn { background: var(--out-dim); color: var(--out); border-color: var(--out-dim); }

    background: var(--surface); border: 1px solid var(--border);

    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.78rem;
    cursor: pointer; transition: all 0.18s; white-space: nowrap;

    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer;

  /* Entradas del log */
  .log-list { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }

  .log-entry {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px;

  .log-entry-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;

  .log-entry-right { text-align: right; flex-shrink: 0; }
  .log-entry-status {
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; padding: 2px 8px; border-radius: 10px;

  }
  .log-empty-icon { font-size: 2.5rem; display: block; margin-bottom: 12px; }

  /* ── PIN OVERLAY ─────────────────────────── */
  #pin-overlay {
    position: fixed; inset: 0; background: var(--bg);
    background-image: radial-gradient(ellipse at 50% 30%, #0a2a4a 0%, transparent 70%);
    z-index: 300; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px; padding: 32px;
  }
  #pin-overlay .ship-icon { font-size: 3rem; margin-bottom: 0; }
  #pin-overlay h2 {
    font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.06em; text-align: center;
    background: linear-gradient(135deg, #fff 20%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  #pin-subtitle { font-size: 0.82rem; color: var(--muted); text-align: center; }

  .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); background: transparent; transition: all 0.2s; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px #fbbf2466; }

  .pin-dot.error  { background: var(--out); border-color: var(--out); animation: shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 280px; }
  .pin-key {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    color: var(--text); font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700;

  .pin-error-msg  { font-size: 0.78rem; color: var(--out); text-align: center; min-height: 1.2em; letter-spacing: 0.04em; }

</style>

<!-- PIN logic -->
<script>
const PIN_CREW    = '2009';
const PIN_CAPTAIN = '0302';
const PIN_SESSION = 'barco_pin_ok';
const ADMIN_SESSION = 'barco_admin_ok';

let pinEntry = '';

function updateDots() {
  const isAdmin = sessionStorage.getItem(ADMIN_SESSION);
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('dot-' + i);
    dot.classList.toggle('filled', i < pinEntry.length);
    dot.classList.toggle('admin', i < pinEntry.length && !!isAdmin);
  }
}

function pinPress(digit) {
  if (pinEntry.length >= 4) return;
  pinEntry += digit;
  updateDots();
  if (pinEntry.length === 4) checkPin();
}

function pinDel() {
  pinEntry = pinEntry.slice(0, -1);
  updateDots();
  document.getElementById('pin-error').textContent = '';
}

function checkPin() {
  if (pinEntry === PIN_CAPTAIN) {
    sessionStorage.setItem(PIN_SESSION, '1');
    sessionStorage.setItem(ADMIN_SESSION, '1');
    document.getElementById('pin-overlay').style.display = 'none';
    activateAdmin();
  } else if (pinEntry === PIN_CREW) {
    sessionStorage.setItem(PIN_SESSION, '1');
    sessionStorage.removeItem(ADMIN_SESSION);
    document.getElementById('pin-overlay').style.display = 'none';
  } else {
    const dots = document.querySelectorAll('.pin-dot');
    dots.forEach(d => { d.classList.remove('filled','admin'); d.classList.add('error'); });
    document.getElementById('pin-error').textContent = 'PIN incorrecto, inténtalo de nuevo';
    setTimeout(() => {
      dots.forEach(d => d.classList.remove('error'));
      pinEntry = ''; updateDots();
      document.getElementById('pin-error').textContent = '';
    }, 900);
  }
}

function activateAdmin() {
  document.body.classList.add('admin-mode');
  document.getElementById('admin-badge').classList.add('visible');
}

function exitAdmin() {
  sessionStorage.removeItem(ADMIN_SESSION);
  document.body.classList.remove('admin-mode');
  document.getElementById('admin-badge').classList.remove('visible');
  showMain();
}

document.addEventListener('keydown', e => {
  if (document.getElementById('pin-overlay').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') pinPress(e.key);
  if (e.key === 'Backspace') pinDel();
});

if (sessionStorage.getItem(PIN_SESSION)) {
  document.getElementById('pin-overlay').style.display = 'none';
  if (sessionStorage.getItem(ADMIN_SESSION)) activateAdmin();
}

// ── Navegación entre pantallas ────────────────────────────
function showMain() {
  document.getElementById('screen-main').classList.add('active');
  document.getElementById('screen-log').classList.remove('active');
}

function showLog() {
  document.getElementById('screen-main').classList.remove('active');
  document.getElementById('screen-log').classList.add('active');
  renderLog();
}
</script>

  appId:             "1:305623972369:web:09a8a752d4402f290d0fb0"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── Tripulación ───────────────────────────────────────────────
const CREW = [
{ id: 1,  name: "CESAR",   role: "Puente",    phone: "696254606" },
  { id: 2,  name: "SERGIO",  role: "Puente",    phone: "699002908" },
  { id: 3,  name: "SAUL",    role: "Puente",    phone: "608076979" },
  { id: 4,  name: "DANI",    role: "Máquinas",  phone: "667789905" },
  { id: 5,  name: "ANTON",   role: "Máquinas",  phone: "679568104" },
  { id: 6,  name: "JUAN A.", role: "Cubierta",  phone: "699632696" },
  { id: 7,  name: "MESURA",  role: "Cubierta",  phone: "619751187" },
  { id: 8,  name: "NURIA",   role: "Cubierta",  phone: "679193330" },
  { id: 9,  name: "ADELINO", role: "Sistemas",  phone: "695301692" },
  { id: 10, name: "TOÑO",    role: "Máquinas",  phone: "673488002" },
  { id: 11, name: "DAVID",   role: "Cubierta",  phone: "669642643" }
];

let statuses  = {};
let logEntries = [];
let logFilter  = 'all';

// ── Estado actual ─────────────────────────────────────────────
onValue(ref(db, 'crew'), snapshot => {
  statuses = snapshot.val() || {};
  renderAll();
});

// ── Registro de movimientos ───────────────────────────────────
onValue(ref(db, 'log'), snapshot => {
  const data = snapshot.val() || {};
  logEntries = Object.values(data).sort((a, b) => b.ts - a.ts);
  renderLog();
});

// ── Cambiar estado + guardar en log ──────────────────────────
function setStatus(id, status) {
  const member = CREW.find(c => c.id === id);
  const now    = new Date();
  const time   = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  const date   = now.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });

  // Actualizar estado actual
  set(ref(db, `crew/${id}`), { status, time });

  // Guardar entrada en el log
  push(ref(db, 'log'), {
    name:   member.name,
    role:   member.role,
    status,
    time,
    date,
    ts: now.getTime()
  });
}
window.setStatus = setStatus;

// ── Renderizar tarjetas ───────────────────────────────────────
function makeCard(c) {
  const s      = statuses[c.id];
  const status = s ? s.status : 'unknown';
  const card   = document.createElement('div');
  card.className = `card ${status}`;
  card.innerHTML = `
    <div class="card-name">${c.name}</div>
    <div class="card-role">${c.role}</div>
    <div class="card-time">${s ? 'desde ' + s.time : 'Sin confirmar'}</div>
    <a class="card-phone" href="tel:${c.phone}">📞 ${c.phone}</a>
    <div class="card-btns">
      <button class="card-btn aboard-btn${status === 'aboard' ? ' active' : ''}"
        onclick="setStatus(${c.id},'aboard')">⚓ A Bordo</button>
      <button class="card-btn out-btn${status === 'out' ? ' active' : ''}"
        onclick="setStatus(${c.id},'out')">🏖️ Tierra</button>
    </div>`;
  return card;
}

function renderAll() {
  const aboardEl  = document.getElementById('grid-aboard');
  const outEl     = document.getElementById('grid-out');
  const unknownEl = document.getElementById('grid-unknown');
  aboardEl.innerHTML = outEl.innerHTML = unknownEl.innerHTML = '';
  let countAboard = 0, countOut = 0;

  CREW.forEach(c => {
    const s    = statuses[c.id];
    const card = makeCard(c);
    if (!s)                         { unknownEl.appendChild(card); }
    else if (s.status === 'aboard') { aboardEl.appendChild(card); countAboard++; }
    else                            { outEl.appendChild(card);    countOut++;    }
  });

  document.getElementById('count-aboard').textContent = countAboard;
  document.getElementById('count-out').textContent    = countOut;
  document.getElementById('section-aboard-label').style.display  = aboardEl.children.length  ? '' : 'none';
  document.getElementById('section-out-label').style.display     = outEl.children.length     ? '' : 'none';
  document.getElementById('section-unknown-label').style.display = unknownEl.children.length ? '' : 'none';
}

// ── Renderizar log ────────────────────────────────────────────
function renderLog() {
  const list = document.getElementById('log-list');
  const filtered = logFilter === 'all' ? logEntries : logEntries.filter(e => e.status === logFilter);

  if (filtered.length === 0) {
    list.innerHTML = `<div class="log-empty"><span class="log-empty-icon">📋</span>No hay movimientos registrados aún</div>`;
    return;
  }

  list.innerHTML = '';
  filtered.forEach(e => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `
      <div class="log-entry-dot ${e.status}"></div>
      <div class="log-entry-info">
        <div class="log-entry-name">${e.name}</div>
        <div class="log-entry-role">${e.role}</div>
      </div>
      <div class="log-entry-right">
        <div class="log-entry-status ${e.status}">${e.status === 'aboard' ? 'A bordo' : 'En tierra'}</div>
        <div class="log-entry-datetime">${e.date} · ${e.time}</div>
      </div>`;
    list.appendChild(div);
  });
}
window.renderLog = renderLog;

// ── Filtros ───────────────────────────────────────────────────
window.setFilter = function(filter) {
  logFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
  renderLog();
};

// ── Exportar CSV ──────────────────────────────────────────────
window.exportCSV = function() {
  if (logEntries.length === 0) { alert('No hay datos para exportar'); return; }
  const header = 'Nombre,Rol,Estado,Fecha,Hora';
  const rows = logEntries.map(e =>
    `"${e.name}","${e.role}","${e.status === 'aboard' ? 'A bordo' : 'En tierra'}","${e.date}","${e.time}"`
  );
  const csv  = [header, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `registro-tripulacion-${new Date().toLocaleDateString('es-ES').replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
};

// ── PWA Service Worker ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'tripulacion-v3';
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('fetch', e => {
      if (e.request.url.includes('firebasedatabase')) return;
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode], { type: 'application/javascript' }))).catch(() => {});
}

// ── Banner instalación Android ────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
});
window.installApp = function() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').style.display = 'none';
    });
  }
};
</script>
